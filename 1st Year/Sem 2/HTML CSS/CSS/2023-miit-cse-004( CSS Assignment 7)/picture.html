<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Picture</title>
	<style>
		.split {
			float: left;
		}
		.name {
			height: 25px;
			margin-bottom: 30px;
			border-radius: 10px;
			border: 3px solid red;
		}
		.save {
			width: 70%;
			height: 35px;
			background-color: hotpink;
			border-radius: 10px;
			border: 2px solid aqua;
		}
	</style>
</head>
<body>
	<img class="split" src="rose4.jpg" style="width: 250px; height: 325px; margin-right: 50px;">
	<form class="split">
		<input class="name" type="text" placeholder="Name"> <br>
		<input class="save" type="submit" value="Save">
	</form>
</body>
</html>
