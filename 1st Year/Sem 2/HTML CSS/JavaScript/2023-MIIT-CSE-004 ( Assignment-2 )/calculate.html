<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Calculation</title>
	<style>
		body{
			font-size:18px;
		}
	</style>
	<script>
		
		for(var i=16;i>0;i--)
		{
         for(var j=1;j<=10;j++)
			{
				
				document.write(i + " * " + j + " = " + i*j + "<br>");
			}
			
			document.write("<br>");
		}
	</script>
</head>
<body>

</body>
</html>
